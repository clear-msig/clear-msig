name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  host-checks:
    name: architecture + fmt + backend clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libssl-dev pkg-config libudev-dev

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: host

      # Backend, command-contract, and thin-CLI clippy are strict below. The
      # execution library and program still have a documented warning backlog,
      # so do not describe the workspace as globally clippy-clean yet.
      #
      # The on-chain crate (`clear-wallet`) is meant for the SBF target and
      # uses nightly features gated to target_os="solana"; host clippy/test
      # only cover the off-chain pieces.

      - name: Backend architecture
        run: |
          bash scripts/check-repository-governance.sh
          bash scripts/check-repository-boundaries.sh
          bash scripts/check-backend-architecture.sh
          bash scripts/check-intent-architecture.sh
          bash scripts/check-signing-architecture.sh
          bash scripts/check-secrets.sh

      - name: Rust formatting
        run: cargo fmt --all -- --check

      - name: Backend + contracts + thin CLI clippy (strict, dependencies excluded)
        run: cargo clippy -p clear-msig-backend-api -p clear-msig-command-contract -p clear-msig-intent -p clear-msig-signing -p clear-msig-cli --all-targets --no-deps -- -D warnings

      - name: cargo test (host crates)
        run: cargo test -p clear-msig-command-contract -p clear-msig-intent -p clear-msig-signing -p clear-msig-execution -p clear-msig-cli -p clear-wallet-client -p clear-msig-backend-api

  frontend-tests:
    name: frontend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      # Node 24 ships with npm 11. Node 22's npm 10 trips on optional
      # peer deps (e.g. `utf-8-validate` under `ws`), reporting them as
      # "Missing from lock file" even though the spec says optional
      # peers stay out of the lockfile unless installed. The lockfile
      # is written by local npm 11; using Node 24 keeps the two in
      # sync. (Self-upgrading npm in-place via `npm install -g npm@11`
      # under Node 22 fails on the action runner with
      # MODULE_NOT_FOUND: promise-retry, so we just pick the Node that
      # bundles the right npm to begin with.)
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/package-lock.json') }}-${{ hashFiles('apps/web/src/**', 'apps/web/next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('apps/web/package-lock.json') }}-

      - name: Production verification
        run: npm run build

  # ------------------------------------------------------------------
  # SBF build — produces target/deploy/clear_wallet.so for devnet
  # `solana program deploy`. Uploaded as an artifact named `clear_wallet-so`
  # on every push so we don't have to run `cargo-build-sbf` locally (the
  # platform-tools tarball is ~250 MB, painful on slow networks). Cached
  # so subsequent runs skip the tarball + dep recompile.
  #
  # The generator remains pinned to the reviewed signer-metadata fix. Program
  # runtime crates use their own immutable Quasar language revision; generated
  # Rust is compared against the checked program client immediately below.
  sbf-build:
    name: clear-wallet (SBF .so)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libssl-dev pkg-config libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + workspace target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: sbf

      - name: Cache Solana platform-tools
        uses: actions/cache@v4
        with:
          path: ~/.cache/solana
          key: solana-platform-tools-v1.52-${{ runner.os }}

      - name: Install Solana CLI (Agave 3.1)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.14/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Quasar CLI
        run: |
          cargo install --git https://github.com/blueshift-gg/quasar \
            --rev 2d5f2d84ff3c13794958f64c22721388280f4ae3 \
            --bin quasar quasar-cli

      - name: quasar build (clear-wallet)
        run: quasar build

      - name: Verify checked generated client
        run: bash scripts/check-generated-client.sh

      - name: Upload clear_wallet.so artifact
        uses: actions/upload-artifact@v4
        with:
          name: clear_wallet-so
          path: target/deploy/clear_wallet.so
          if-no-files-found: error
          retention-days: 30

  svm-program-tests:
    name: clear-wallet SVM execution tests
    runs-on: ubuntu-latest
    needs: sbf-build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libssl-dev pkg-config libudev-dev

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: svm

      - name: Download clear_wallet.so artifact
        uses: actions/download-artifact@v4
        with:
          name: clear_wallet-so
          path: target/deploy

      - name: Run clear-wallet SVM tests
        run: cargo test -p clear-wallet -- --nocapture
