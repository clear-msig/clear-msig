name: Deploy backend to Fly

# Manual deploy of the backend-api + bundled clear-msig CLI to Fly.io.
# Trigger from the Actions tab or via `gh workflow run deploy-fly`.
# Repository secret `FLY_API_TOKEN` must be set before this can run.
#
# Why a workflow at all (rather than `flyctl deploy` from a laptop):
#   - The Dockerfile builds the entire workspace (CLI + backend-api),
#     which is heavy on flaky home networks. GitHub's runners have
#     reliable bandwidth + a fresh Docker engine.
#   - Repeatable. Anyone with repo access can trigger a deploy without
#     installing flyctl locally or pasting tokens around.

on:
  workflow_dispatch:
    inputs:
      app:
        description: "Fly app name to deploy (defaults to fly.toml's app)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  deploy:
    name: flyctl deploy
    runs-on: ubuntu-latest
    concurrency: deploy-fly
    steps:
      - uses: actions/checkout@v7

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: flyctl deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -n "${{ inputs.app }}" ]; then
            flyctl deploy --remote-only --app "${{ inputs.app }}"
          else
            flyctl deploy --remote-only
          fi
