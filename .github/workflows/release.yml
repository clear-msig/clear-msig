name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-13
            archive: clear-msig-${{ github.ref_name }}-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: clear-msig-${{ github.ref_name }}-macos-arm64.tar.gz
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: clear-msig-${{ github.ref_name }}-linux-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libssl-dev pkg-config libudev-dev

      - name: Install protoc + OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install protobuf openssl@3 pkg-config
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release CLI
        run: cargo build --release -p clear-msig-cli --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/clear-msig dist/
          cp README.md DEPLOYMENTS.md LICENSE* dist/ 2>/dev/null || true
          tar -czf ${{ matrix.archive }} -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            **Pre-alpha release.** The on-chain `clear-wallet` program is deployed
            on Solana devnet only. The Ika dWallet network used for signing is a
            mock signer, not production MPC. Do not use with real funds.

            See [DEPLOYMENTS.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/DEPLOYMENTS.md)
            for the deployed program ID and Ika endpoints, and
            [scripts/cli-demo-bootstrap.sh](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/scripts/cli-demo-bootstrap.sh)
            for an end-to-end devnet demo.
