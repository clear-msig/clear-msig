version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
      time: "06:00"
      timezone: Africa/Lagos
    open-pull-requests-limit: 1
    labels: [dependencies, rust]
    groups:
      routine-rust:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
      time: "06:30"
      timezone: Africa/Lagos
    open-pull-requests-limit: 1
    labels: [dependencies, frontend]
    groups:
      routine-frontend:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "07:00"
      timezone: Africa/Lagos
    open-pull-requests-limit: 1
    labels: [dependencies, ci]
    groups:
      routine-actions:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
