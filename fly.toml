# fly.toml — clear-msig backend-api
#
# Deploys the backend (and bundled clear-msig CLI) on Fly.io. Pair with the
# Vercel-hosted frontend; set NEXT_PUBLIC_BACKEND_API_URL on Vercel to the
# Fly app URL once the app is launched.
#
# First-time setup:
#   fly launch --no-deploy --copy-config --name <your-app-name>
#   fly secrets set \
#     CLEAR_MSIG_KEYPAIR_BASE64="$(base64 -i ~/clear-msig-demo/payer.json)" \
#     CLEAR_MSIG_SIGNER_BASE64="$(base64 -i ~/clear-msig-demo/signer1.json)"
#   fly deploy

app = "clear-msig-backend"  # change with `fly launch --copy-config --name`
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  CLEAR_MSIG_ENV = "production"
  CLEAR_MSIG_URL = "https://api.devnet.solana.com"
  CLEAR_MSIG_ALLOWED_ORIGIN = "https://clearsig.xyz,https://www.clearsig.xyz"
  BACKEND_API_BIND = "0.0.0.0:8080"
  RUST_LOG = "info"
  # DKG attestations persist on the mounted volume below. Without
  # this every redeploy wipes the container fs and bricks every
  # wallet whose Ika chain bindings depend on these files.
  CLEAR_MSIG_ATTESTATION_DIR = "/data/attestations"

# Persistent volume — backs CLEAR_MSIG_ATTESTATION_DIR. One-time:
#   fly volume create clear_msig_data --region iad --size 1 --app clear-msig-backend
# Multiple machines need multiple volumes (Fly volumes are not
# shared). With min_machines_running=1 + auto_start, ensure a
# volume exists per machine slot.
[mounts]
  source = "clear_msig_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Pre-alpha: machines stay running. The previous combination of
  # auto_stop_machines = "stop" + min_machines_running = 1 was
  # racing — Fly's auto-stop would still suspend idle machines and
  # the cold-start wake on the next request landed in the user's
  # demo as a 502 / "site is down". Disabling auto_stop and keeping
  # min_machines_running = 1 means the backend stays warm 24/7.
  # Trades a few cents/day for the reliability we need while users
  # are testing the wallet.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  # Tightened health-check window. 30s interval used to mean a
  # crashing process took up to a full minute to be replaced; on a
  # 1-machine pool that's a full minute of 502s. 15s halves the
  # window without spamming the health endpoint.
  [[http_service.checks]]
    grace_period = "15s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

# Memory bumped from 512mb → 1024mb. The Rust backend itself fits
# in 512mb, but each /execute request shells out to the clear-msig
# CLI (a separate Rust binary that loads its own Solana RPC + Ika
# gRPC clients), and a couple of concurrent CLI invocations would
# OOM-kill the parent. 1024mb is safe headroom on shared-cpu-1x.
[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
