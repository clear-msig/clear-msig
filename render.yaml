# Render Blueprint for the clear-msig backend API.
#
# Create from Render Dashboard: New > Blueprint > connect this repo.
# The service builds the existing Dockerfile, which bundles:
#   - clear-msig-backend-api
#   - clear-msig CLI
#   - examples/intents/*
#
# Required secrets are marked sync:false and must be filled in the
# Render dashboard before the service can boot.

services:
  - type: web
    runtime: docker
    name: clear-msig-backend
    region: virginia
    plan: starter
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    numInstances: 1
    autoDeployTrigger: checksPass
    disk:
      name: clear-msig-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORT
        value: "10000"
      - key: CLEAR_MSIG_ENV
        value: production
      - key: CLEAR_MSIG_URL
        value: https://solana-devnet.g.alchemy.com/v2/olIm3vyHF32h_G4dZgMPH
      - key: BACKEND_API_BIND
        value: 0.0.0.0:10000
      - key: CLEAR_MSIG_ATTESTATION_DIR
        value: /data/attestations
      - key: CLEAR_MSIG_PRO_STORE_PATH
        value: /data/pro-store.json
      - key: CLEAR_MSIG_ALLOWED_ORIGIN
        value: https://clearsig.xyz,https://www.clearsig.xyz
      - key: CLEAR_MSIG_PROGRAM_ID
        value: 53aZBmukjX5sYxbrYVRDd2DWzsRWVmvVFPY6PcyomR5v
      - key: RUST_LOG
        value: info
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: CLEAR_MSIG_KEYPAIR_BASE64
        sync: false
      - key: CLEAR_MSIG_SIGNER_BASE64
        sync: false
      - key: CLEAR_MSIG_DEFAULT_DWALLET_PROGRAM
        sync: false
      - key: CLEAR_MSIG_DEFAULT_GRPC_URL
        sync: false
      - key: CLEAR_MSIG_DEFAULT_DEST_RPC_URL
        sync: false
